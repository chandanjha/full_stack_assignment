services:
  db:
    image: postgres:16
    container_name: app_db
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: app_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  redisinsight:
    image: redis/redisinsight:latest
    container_name: app_redisinsight
    ports:
      - "5540:5540"
    volumes:
      - redisinsight_data:/data
    depends_on:
      - redis

  pgadmin:
    image: dpage/pgadmin4
    container_name: app_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PYTHONWARNINGS: ignore::SyntaxWarning
    ports:
      - "5050:80"
    depends_on:
      - db
  backend:
    build: ./backend
    container_name: app_backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: appdb
      DB_USER: appuser
      DB_PASSWORD: apppass
      REDIS_ENABLED: "true"
      REDIS_URL: redis://redis:6379/0
      REDIS_SOCKET_TIMEOUT_SECONDS: 0.5
      REDIS_SOCKET_CONNECT_TIMEOUT_SECONDS: 0.5
      RECOMMENDATION_CACHE_TTL_SECONDS: 900
      RECOMMENDATION_CACHE_WARM_LIMIT: 5
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - db
      - redis
      - ollama

  ollama:
    image: ollama/ollama:latest
    container_name: app_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  frontend:
    build: ./frontend-next
    container_name: app_frontend
    environment:
      BACKEND_API_BASE_URL: http://backend:8000/api
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    volumes:
      - ./frontend-next:/app
      # keep container dependencies separate from host bind mount
      - /app/node_modules
      # keeps Next build artifacts inside the container to avoid stale host-side chunks
      - /app/.next
    depends_on:
      - backend

volumes:
  pgdata:
  redis_data:
  redisinsight_data:
  ollama_data:
