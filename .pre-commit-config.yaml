repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: ruff check --fix --config backend/pyproject.toml
        language: system
        types_or: [python, pyi]
        files: ^backend/.*\.py$
      - id: ruff-format
        name: ruff format
        entry: ruff format --config backend/pyproject.toml
        language: system
        types_or: [python, pyi]
        files: ^backend/.*\.py$
